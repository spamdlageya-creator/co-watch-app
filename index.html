<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Co-Watch Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/simple-peer@9.11.1/simplepeer.min.js"></script>
    <style>
        .hidden-ui { opacity: 0; pointer-events: none; transform: translateY(10px); }
        .visible-ui { opacity: 1; pointer-events: auto; transform: translateY(0); transition: all 0.4s ease; }
        .message-reaction { transition: transform 0.2s; }
        .message-reaction:active { transform: scale(1.4); }
        #video-container:fullscreen #chat-sidebar { position: absolute; right: 0; top: 0; height: 100%; width: 250px; background: rgba(17, 24, 39, 0.8); z-index: 50; }
    </style>
</head>
<body class="bg-black text-white overflow-hidden h-screen w-screen">

    <div id="login-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-gray-900 p-6">
        <div class="w-full max-w-sm bg-gray-800 p-8 rounded-2xl border border-gray-700">
            <h2 class="text-2xl font-bold mb-6 text-indigo-400">Co-Watch <span class="text-xs font-normal text-gray-400">v2.0</span></h2>
            <input type="text" id="nickname" class="w-full p-3 bg-gray-900 rounded-lg mb-4 border border-gray-700" placeholder="Ваш ник">
            <button id="btn-create" class="w-full bg-indigo-600 py-3 rounded-lg font-bold mb-4">Создать комнату</button>
            <div class="text-center text-xs text-gray-500 mb-4">ИЛИ</div>
            <input type="text" id="admin-nickname" class="w-full p-3 bg-gray-900 rounded-lg mb-4 border border-gray-700" placeholder="Ник админа">
            <button id="btn-join" class="w-full bg-emerald-600 py-3 rounded-lg font-bold">Присоединиться</button>
        </div>
    </div>

    <div id="room-screen" class="hidden h-full flex flex-col md:flex-row overflow-hidden">
        
        <div id="video-container" class="relative flex-grow bg-black group overflow-hidden">
            <video id="video-player" class="w-full h-full object-contain" autoplay playsinline></video>
            
            <div id="ui-overlay" class="visible-ui absolute inset-0 flex flex-col justify-between p-4 pointer-events-none">
                <div class="flex justify-between items-start pointer-events-auto">
                    <div class="flex flex-col gap-2">
                        <div id="live-badge" class="hidden bg-red-600 text-[10px] font-bold px-2 py-0.5 rounded flex items-center gap-1 animate-pulse">
                            <span class="w-1.5 h-1.5 bg-white rounded-full"></span> В ЭФИРЕ
                        </div>
                        <div class="bg-black/50 backdrop-blur px-3 py-1 rounded text-xs">
                            <i class="fa-solid fa-eye mr-1"></i> <span id="viewer-count">0</span>
                        </div>
                    </div>
                    <button id="btn-share" class="hidden bg-indigo-600 px-4 py-2 rounded-lg text-sm font-bold shadow-lg shadow-indigo-500/40">Транслировать</button>
                </div>

                <div class="flex justify-end gap-3 pointer-events-auto">
                    <div id="volume-wrapper" class="flex items-center bg-black/50 backdrop-blur px-3 py-2 rounded-full border border-white/10">
                        <i class="fa-solid fa-volume-low text-xs mr-2"></i>
                        <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="1" class="w-20">
                    </div>
                    <button id="btn-fullscreen" class="bg-black/50 backdrop-blur w-10 h-10 rounded-full flex items-center justify-center border border-white/10">
                        <i class="fa-solid fa-expand"></i>
                    </button>
                </div>
            </div>
        </div>

        <div id="chat-sidebar" class="w-full md:w-80 lg:w-96 bg-gray-900 flex flex-col border-l border-gray-800 transition-all duration-300">
            <div id="chat-messages" class="flex-grow p-4 overflow-y-auto space-y-4"></div>
            
            <div id="reply-preview" class="hidden px-4 py-2 bg-gray-800 border-t border-indigo-500 flex justify-between items-center text-xs">
                <span id="reply-text" class="truncate italic text-gray-400"></span>
                <button id="cancel-reply" class="text-red-400 px-2"><i class="fa-solid fa-xmark"></i></button>
            </div>

            <form id="chat-form" class="p-4 bg-gray-800 flex gap-2">
                <input type="text" id="chat-input" class="flex-grow bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-500" placeholder="Сообщение..." autocomplete="off">
                <button class="text-indigo-500 text-xl px-2"><i class="fa-solid fa-paper-plane"></i></button>
            </form>
        </div>
    </div>

    <script>
        const socket = io();
        let myName = localStorage.getItem('co-watch-nick') || '';
        let roomName = '';
        let isAdmin = false;
        let replyingTo = null;
        let idleTimer;

        // Инициализация ника
        if(myName) document.getElementById('nickname').value = myName;

        const uiOverlay = document.getElementById('ui-overlay');
        const videoPlayer = document.getElementById('video-player');
        const chatMessages = document.getElementById('chat-messages');

        // --- Умный Fullscreen ---
        function resetIdleTimer() {
            uiOverlay.classList.remove('hidden-ui');
            uiOverlay.classList.add('visible-ui');
            clearTimeout(idleTimer);
            if (document.fullscreenElement) {
                idleTimer = setTimeout(() => {
                    uiOverlay.classList.remove('visible-ui');
                    uiOverlay.classList.add('hidden-ui');
                }, 3000);
            }
        }
        ['mousemove', 'touchstart', 'keydown'].forEach(ev => window.addEventListener(ev, resetIdleTimer));

        // --- Вход ---
        document.getElementById('btn-create').onclick = () => login(true);
        document.getElementById('btn-join').onclick = () => login(false);

        function login(create) {
            myName = document.getElementById('nickname').value.trim();
            if(!myName) return alert("Введите ник");
            localStorage.setItem('co-watch-nick', myName);
            
            isAdmin = create;
            roomName = create ? myName : document.getElementById('admin-nickname').value.trim();
            
            socket.emit(create ? 'create-room' : 'join-room', roomName, myName);
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('room-screen').classList.remove('hidden');
            if(isAdmin) document.getElementById('btn-share').classList.remove('hidden');
        }

        // --- WebRTC со STUN ---
        const peerOptions = (stream) => ({
            initiator: isAdmin,
            stream: stream,
            trickle: true,
            config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }] }
        });

        document.getElementById('btn-share').onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: { frameRate: { ideal: 30, max: 60 }, contentHint: 'motion' },
                    audio: true
                });
                videoPlayer.srcObject = stream;
                videoPlayer.muted = true;
                document.getElementById('live-badge').classList.remove('hidden');
                // Логика Simple-Peer для стриминга...
            } catch(e) { console.error(e); }
        };

        // --- Чат с ответами и реакциями ---
        document.getElementById('chat-form').onsubmit = (e) => {
            e.preventDefault();
            const input = document.getElementById('chat-input');
            const val = input.value.trim();
            if(!val) return;

            socket.emit('chat-message', roomName, {
                id: Date.now(),
                user: myName,
                text: val,
                replyTo: replyingTo
            });
            input.value = '';
            cancelReply();
        };

        socket.on('chat-message', (data) => {
            const div = document.createElement('div');
            div.className = "bg-gray-800 p-3 rounded-xl relative group border border-transparent hover:border-gray-600";
            div.onclick = () => setReply(data);
            
            let replyHtml = data.replyTo ? `<div class="text-[10px] text-gray-500 border-l-2 border-indigo-500 pl-2 mb-1">Ответ: ${data.replyTo.text}</div>` : '';
            
            div.innerHTML = `
                ${replyHtml}
                <div class="text-xs font-bold text-indigo-400 mb-1">${data.user}</div>
                <div class="text-sm text-gray-200">${data.text}</div>
                <div class="flex gap-2 mt-2">
                    <button onclick="event.stopPropagation(); react('${data.id}', '👍')" class="message-reaction text-xs grayscale hover:grayscale-0 opacity-50 hover:opacity-100">👍</button>
                    <button onclick="event.stopPropagation(); react('${data.id}', '😂')" class="message-reaction text-xs grayscale hover:grayscale-0 opacity-50 hover:opacity-100">😂</button>
                    <button onclick="event.stopPropagation(); react('${data.id}', '🔥')" class="message-reaction text-xs grayscale hover:grayscale-0 opacity-50 hover:opacity-100">🔥</button>
                </div>
                <div id="reactions-${data.id}" class="flex gap-1 mt-1"></div>
            `;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            if(data.user !== myName && !document.hidden) new Audio('https://www.soundjay.com/buttons/beep-07a.mp3').play().catch(()=>{});
        });

        window.react = (id, emoji) => socket.emit('add-reaction', roomName, id, emoji);

        socket.on('update-reaction', ({ messageId, emoji }) => {
            const container = document.getElementById(`reactions-${messageId}`);
            if(!container) return;
            const existing = Array.from(container.children).find(c => c.dataset.emoji === emoji);
            if(existing) {
                existing.innerText = `${emoji} ${parseInt(existing.innerText.split(' ')[1]) + 1}`;
            } else {
                const span = document.createElement('span');
                span.dataset.emoji = emoji;
                span.className = "text-[10px] bg-gray-700 px-1.5 py-0.5 rounded-full";
                span.innerText = `${emoji} 1`;
                container.appendChild(span);
            }
        });

        function setReply(data) {
            replyingTo = data;
            document.getElementById('reply-preview').classList.remove('hidden');
            document.getElementById('reply-text').innerText = `${data.user}: ${data.text}`;
            document.getElementById('chat-input').focus();
        }

        function cancelReply() {
            replyingTo = null;
            document.getElementById('reply-preview').classList.add('hidden');
        }
        document.getElementById('cancel-reply').onclick = (e) => { e.stopPropagation(); cancelReply(); };

        // --- Статистика ---
        socket.on('room-stats', ({ viewerCount }) => {
            document.getElementById('viewer-count').innerText = viewerCount;
        });

        // Fullscreen Toggle
        document.getElementById('btn-fullscreen').onclick = () => {
            if (!document.fullscreenElement) {
                document.getElementById('video-container').requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        };

        // Громкость
        document.getElementById('volume-slider').oninput = (e) => {
            videoPlayer.volume = e.target.value;
        };
    </script>
</body>
</html>
