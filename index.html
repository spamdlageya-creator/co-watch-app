<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Co-Watch | Совместный просмотр</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/simple-peer@9.11.1/simplepeer.min.js"></script>
    <style>
        #chat-messages::-webkit-scrollbar { width: 4px; }
        #chat-messages::-webkit-scrollbar-thumb { background-color: #4B5563; border-radius: 4px; }
        input[type=range] { accent-color: #6366f1; }
        body { position: fixed; width: 100%; height: 100%; }
        /* Класс для плавного скрытия интерфейса */
        .fade-ui { transition: opacity 0.3s ease; }
        .hidden-ui { opacity: 0 !important; pointer-events: none; }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans overflow-hidden" oncontextmenu="return false;"> 

    <div id="ctx-menu" class="hidden fixed bg-gray-800 border border-gray-600 rounded-lg shadow-xl z-[200] py-1 text-sm">
        <button id="btn-kick" class="w-full text-left px-4 py-2 text-red-400 hover:bg-gray-700 hover:text-red-300 font-bold">
            <i class="fa-solid fa-ban mr-2"></i>Выгнать
        </button>
    </div>

    <div id="toast-error" class="hidden fixed top-5 left-1/2 transform -translate-x-1/2 bg-red-600 text-white px-6 py-3 rounded-lg shadow-2xl z-[100] font-bold text-center w-11/12 max-w-md transition-all"></div>

    <div id="login-screen" class="w-full h-full flex flex-col items-center justify-center p-4">
        <div class="w-full max-w-md bg-gray-800 p-8 rounded-2xl shadow-2xl border border-gray-700">
            <h1 class="text-3xl font-bold mb-6 text-center text-indigo-400"><i class="fa-solid fa-popcorn mb-2 block text-4xl"></i>Co-Watch</h1>
            
            <div class="mb-4">
                <input type="text" id="nickname" class="w-full p-3 bg-gray-900 border border-gray-700 rounded-lg text-white focus:outline-none focus:border-indigo-500 transition" placeholder="Ваш никнейм">
            </div>

            <button id="btn-create" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-lg transition mb-4 shadow-lg">
                <i class="fa-solid fa-tower-broadcast mr-2"></i> Создать трансляцию
            </button>

            <div class="relative flex py-3 items-center">
                <div class="flex-grow border-t border-gray-700"></div>
                <span class="flex-shrink-0 mx-4 text-gray-500 text-sm font-medium">ИЛИ</span>
                <div class="flex-grow border-t border-gray-700"></div>
            </div>

            <div class="mb-4 mt-2">
                <input type="text" id="admin-nickname" class="w-full p-3 bg-gray-900 border border-gray-700 rounded-lg text-white focus:outline-none focus:border-green-500 transition" placeholder="Никнейм админа">
            </div>

            <button id="btn-join" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-4 rounded-lg transition shadow-lg">
                <i class="fa-solid fa-right-to-bracket mr-2"></i> Присоединиться
            </button>
        </div>
    </div>

    <div id="room-screen" class="hidden w-full h-full flex flex-col md:flex-row">
        
        <div id="video-container" class="relative flex-grow bg-black flex flex-col h-[50vh] md:h-full group">
            
            <div id="ui-top" class="fade-ui absolute top-0 left-0 w-full p-4 bg-gradient-to-b from-black/80 to-transparent z-10 flex justify-between items-center opacity-100 md:opacity-0 md:group-hover:opacity-100">
                <div id="room-info" class="bg-gray-800/80 backdrop-blur px-3 py-1.5 rounded-md text-sm font-medium border border-gray-600"></div>
                
                <div id="share-controls" class="hidden flex gap-2">
                    <button id="btn-share-screen" class="bg-indigo-600 hover:bg-indigo-500 text-sm px-4 py-2 rounded-md font-bold transition shadow-lg" title="Транслировать экран">
                        <i class="fa-solid fa-desktop md:mr-2"></i><span class="hidden md:inline">Экран</span>
                    </button>
                    <button id="btn-share-cam" class="bg-indigo-600 hover:bg-indigo-500 text-sm px-4 py-2 rounded-md font-bold transition shadow-lg" title="Транслировать камеру">
                        <i class="fa-solid fa-camera md:mr-2"></i><span class="hidden md:inline">Камера</span>
                    </button>
                </div>
            </div>
            
            <video id="video-player" class="w-full h-full object-contain" autoplay playsinline></video>
            
            <div id="waiting-text" class="absolute inset-0 flex flex-col items-center justify-center text-gray-500 pointer-events-none">
                <i class="fa-solid fa-circle-notch fa-spin text-4xl mb-3 text-indigo-500"></i>
                <span class="text-lg font-medium">Ожидание трансляции...</span>
            </div>

            <div id="video-controls" class="fade-ui hidden absolute bottom-0 left-0 w-full p-4 bg-gradient-to-t from-black/90 to-transparent z-10 flex items-center justify-end gap-3 opacity-100 md:opacity-0 md:group-hover:opacity-100">
                
                <div id="quality-control" class="hidden flex items-center gap-2 bg-gray-800/80 backdrop-blur px-2 py-1.5 rounded border border-gray-600">
                    <i class="fa-solid fa-gear text-sm text-gray-300"></i>
                    <select id="quality-selector" class="bg-transparent text-xs text-white outline-none cursor-pointer">
                        <option value="1080">1080p</option>
                        <option value="720">720p</option>
                        <option value="480" selected>480p</option>
                        <option value="360">360p</option>
                    </select>
                </div>

                <div id="volume-control" class="flex items-center gap-2 bg-gray-800/80 backdrop-blur px-3 py-1.5 rounded-full border border-gray-600">
                    <i class="fa-solid fa-volume-high text-sm text-gray-300"></i>
                    <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="1" class="w-20 md:w-24 cursor-pointer">
                </div>
                
                <button id="btn-fullscreen" class="bg-gray-800/80 hover:bg-gray-700 backdrop-blur p-2.5 rounded-full border border-gray-600 transition text-gray-200">
                    <i class="fa-solid fa-expand"></i>
                </button>
            </div>
        </div>

        <div class="w-full h-[50vh] md:h-full md:w-80 lg:w-96 bg-gray-800 flex flex-col border-t md:border-t-0 md:border-l border-gray-700">
            <div class="p-3 bg-gray-900 border-b border-gray-700 flex items-center gap-2 shrink-0">
                <i class="fa-regular fa-comments text-indigo-400"></i>
                <span class="font-bold text-sm">Чат</span>
            </div>
            
            <div id="chat-messages" class="flex-grow p-4 overflow-y-auto flex flex-col pb-20 md:pb-4 relative"></div>

            <div class="p-3 bg-gray-900 border-t border-gray-700 shrink-0">
                <form id="chat-form" class="flex gap-2 relative">
                    <input type="text" id="chat-input" class="flex-grow p-2.5 bg-gray-800 border border-gray-600 rounded-lg text-sm focus:outline-none focus:border-indigo-500 transition pr-10" placeholder="Написать..." autocomplete="off">
                    <button type="submit" class="absolute right-1 top-1 bottom-1 text-indigo-400 hover:text-indigo-300 p-2 rounded transition">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let myName = localStorage.getItem('savedNickname') || '';
        if (myName) document.getElementById('nickname').value = myName;
        
        let roomName = '';
        let isAdmin = false;
        let localStream = null;
        let lastMsgAuthor = null;
        const peers = {};

        const webRtcConfig = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        };

        const loginScreen = document.getElementById('login-screen');
        const roomScreen = document.getElementById('room-screen');
        const videoPlayer = document.getElementById('video-player');
        const chatMessages = document.getElementById('chat-messages');
        const uiBot = document.getElementById('video-controls');
        const qualityControl = document.getElementById('quality-control');
        const qualitySelector = document.getElementById('quality-selector');

        // --- УВЕДОМЛЕНИЯ ---
        function showError(msg) {
            const toast = document.getElementById('toast-error');
            toast.innerText = msg; toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 5000);
        }
        socket.on('error-msg', (msg) => {
            showError(msg);
            if(msg.includes('завершил') || msg.includes('не существует')) setTimeout(() => window.location.reload(), 3000);
        });
        socket.on('kicked-notice', () => {
            alert('Вас выгнали из комнаты.');
            window.location.reload();
        });

        // --- MOBILE UI AUTO-HIDE ---
        let uiTimeout;
        const uiTop = document.getElementById('ui-top');
        
        function resetUiTimer() {
            uiTop.classList.remove('hidden-ui');
            uiBot.classList.remove('hidden-ui');
            clearTimeout(uiTimeout);
            if (window.innerWidth < 768 || document.fullscreenElement) {
                uiTimeout = setTimeout(() => {
                    uiTop.classList.add('hidden-ui');
                    uiBot.classList.add('hidden-ui');
                }, 3000);
            }
        }
        document.getElementById('video-container').addEventListener('mousemove', resetUiTimer);
        document.getElementById('video-container').addEventListener('touchstart', resetUiTimer);

        // --- ВХОД ---
        document.getElementById('btn-create').addEventListener('click', () => {
            myName = document.getElementById('nickname').value.trim();
            if (!myName) return showError('Введите ваш ник!');
            localStorage.setItem('savedNickname', myName); 
            isAdmin = true; roomName = myName;
            socket.emit('create-room', roomName);
        });

        document.getElementById('btn-join').addEventListener('click', () => {
            myName = document.getElementById('nickname').value.trim();
            roomName = document.getElementById('admin-nickname').value.trim();
            if (!myName || !roomName) return showError('Заполните поля!');
            localStorage.setItem('savedNickname', myName); 
            isAdmin = false;
            socket.emit('join-room', roomName, myName);
        });

        socket.on('room-ready', (isCreator) => {
            loginScreen.classList.add('hidden');
            roomScreen.classList.remove('hidden');
            document.getElementById('room-info').innerHTML = `<i class="fa-solid fa-users mr-2 text-indigo-400"></i> ${roomName}`;
            if (isCreator) {
                document.getElementById('share-controls').classList.remove('hidden');
                document.getElementById('volume-control').classList.add('hidden'); // Админу не нужна своя громкость
                qualityControl.classList.remove('hidden'); // Показываем выбор качества админу
                videoPlayer.muted = true;
            }
            resetUiTimer();
        });

        // --- ТРАНСЛЯЦИЯ ---
        async function stopMyStream() {
            if (localStream) {
                localStream.getTracks().forEach(t => t.stop());
                localStream = null;
                socket.emit('stop-stream-notice', roomName);
            }
        }

        // Общая функция старта стрима (камера или экран)
        async function startStream(type) {
            try {
                if (localStream) await stopMyStream(); 
                
                const idealHeight = parseInt(qualitySelector.value);

                if (type === 'screen') {
                    localStream = await navigator.mediaDevices.getDisplayMedia({ 
                        video: { height: { ideal: idealHeight } }, 
                        audio: true 
                    });
                } else if (type === 'camera') {
                    localStream = await navigator.mediaDevices.getUserMedia({ 
                        video: { height: { ideal: idealHeight } }, 
                        audio: true 
                    });
                }

                videoPlayer.srcObject = localStream;
                document.getElementById('waiting-text').classList.add('hidden');
                document.getElementById('share-controls').classList.add('hidden');
                uiBot.classList.remove('hidden');

                // Обновляем треки у зрителей на лету
                Object.keys(peers).forEach(id => {
                    if (peers[id] && !peers[id].destroyed) {
                        try { peers[id].replaceTrack(peers[id].streams[0].getVideoTracks()[0], localStream.getVideoTracks()[0], peers[id].streams[0]); } catch(e){}
                    }
                });

                localStream.getVideoTracks()[0].onended = () => {
                    stopMyStream();
                    document.getElementById('share-controls').classList.remove('hidden');
                    uiBot.classList.add('hidden');
                    document.getElementById('waiting-text').classList.remove('hidden');
                    videoPlayer.srcObject = null;
                };
            } catch (err) {
                showError('Ошибка доступа к медиа');
                console.error(err);
            }
        }

        document.getElementById('btn-share-screen').addEventListener('click', () => startStream('screen'));
        document.getElementById('btn-share-cam').addEventListener('click', () => startStream('camera'));

        // Смена качества на лету
        qualitySelector.addEventListener('change', async (e) => {
            if (localStream && isAdmin) {
                const height = parseInt(e.target.value);
                const track = localStream.getVideoTracks()[0];
                try {
                    await track.applyConstraints({ height: { ideal: height } });
                    addSystemMessage(`Качество трансляции изменено на ${height}p`, 'text-blue-400');
                } catch (err) {
                    showError('Браузер не поддерживает смену качества на лету');
                }
            }
        });

        socket.on('stream-cleared', () => {
            videoPlayer.srcObject = null;
            document.getElementById('waiting-text').classList.remove('hidden');
            uiBot.classList.add('hidden');
        });

        // Управление UI видео
        document.getElementById('volume-slider').addEventListener('input', (e) => videoPlayer.volume = e.target.value);
        document.getElementById('btn-fullscreen').addEventListener('click', () => {
            const vc = document.getElementById('video-container');
            if (!document.fullscreenElement) vc.requestFullscreen().catch(e => {});
            else document.exitFullscreen();
        });

        // --- WEBRTC ---
        socket.on('user-joined', (userId, userName) => {
            addSystemMessage(`${userName} присоединился к просмотру`);
            if (isAdmin && localStream) {
                const peer = new SimplePeer({ initiator: true, stream: localStream, trickle: true, config: webRtcConfig });
                peer.on('signal', signalData => socket.emit('signal', userId, signalData));
                peers[userId] = peer;
            }
        });

        socket.on('user-left', (userName) => addSystemMessage(`${userName} покинул трансляцию`, 'text-red-400'));

        let peerForViewer = null;
        socket.on('signal', (fromId, signalData) => {
            if (isAdmin) {
                if (peers[fromId]) peers[fromId].signal(signalData);
            } else {
                if (!peerForViewer) {
                    peerForViewer = new SimplePeer({ initiator: false, trickle: true, config: webRtcConfig });
                    peerForViewer.on('signal', signalData => socket.emit('signal', fromId, signalData));
                    peerForViewer.on('stream', stream => {
                        videoPlayer.srcObject = stream;
                        document.getElementById('waiting-text').classList.add('hidden');
                        uiBot.classList.remove('hidden');
                        videoPlayer.play().catch(e => addSystemMessage("Нажмите на видео, чтобы включить звук", "text-yellow-400"));
                    });
                }
                peerForViewer.signal(signalData);
            }
        });

        // --- ЧАТ (Группировка с отступами) ---
        document.getElementById('chat-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const input = document.getElementById('chat-input');
            if (input.value.trim()) {
                socket.emit('chat-message', roomName, myName, input.value.trim());
                input.value = '';
            }
        });

        socket.on('chat-message', (data) => {
            const isMe = data.user === myName;
            const isGroup = lastMsgAuthor === data.user;
            
            const div = document.createElement('div');
            // Если сообщение в группе (от того же человека подряд) — отступ 2px (mt-0.5), иначе большой отступ (mt-3)
            div.className = `chat-msg-block flex flex-col ${isMe ? 'items-end' : 'items-start'} ${isGroup ? 'mt-1' : 'mt-4'}`;
            div.dataset.id = data.id;
            div.dataset.user = data.user;

            let nickHTML = '';
            // Ник показываем только если это первое сообщение в группе
            if (!isGroup) {
                nickHTML = `<span class="text-[10px] mb-1 ${isMe ? 'text-indigo-400' : 'text-emerald-400'} font-bold uppercase">${data.user}</span>`;
            }

            // Радиусы тоже меняем: чтобы был красивый пузырьковый эффект
            const radiusClasses = isMe 
                ? (isGroup ? 'rounded-l-lg rounded-r-md' : 'rounded-lg rounded-br-none') 
                : (isGroup ? 'rounded-r-lg rounded-l-md' : 'rounded-lg rounded-bl-none');

            div.innerHTML = `
                ${nickHTML}
                <div class="msg-content px-3 py-2 max-w-[90%] break-words ${isMe ? 'bg-indigo-600 text-white' : 'bg-gray-700 text-gray-200'} ${radiusClasses}">
                    <div>${data.text}</div>
                </div>
            `;
            chatMessages.appendChild(div);
            
            lastMsgAuthor = data.user;
            chatMessages.scrollTop = chatMessages.scrollHeight;
        });

        function addSystemMessage(text, colorClass = 'text-gray-400') {
            lastMsgAuthor = null; // Сбрасываем группировку
            const div = document.createElement('div');
            div.className = "flex justify-center mt-3";
            div.innerHTML = `<span class="bg-gray-700/50 ${colorClass} text-[10px] px-3 py-1 rounded-full text-center uppercase font-bold">${text}</span>`;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // --- КОНТЕКСТНОЕ МЕНЮ ДЛЯ КИКА ---
        let targetKickId = null;
        const ctxMenu = document.getElementById('ctx-menu');

        chatMessages.addEventListener('contextmenu', (e) => {
            e.preventDefault(); 
            if (!isAdmin) return; 

            const msgBlock = e.target.closest('.chat-msg-block');
            if (!msgBlock) return;

            const id = msgBlock.dataset.id;
            const user = msgBlock.dataset.user;
            
            if (id === socket.id || user === myName) return; 

            targetKickId = id;
            
            ctxMenu.style.top = `${e.clientY}px`;
            ctxMenu.style.left = `${e.clientX}px`;
            ctxMenu.classList.remove('hidden');
        });

        document.addEventListener('click', () => {
            ctxMenu.classList.add('hidden');
        });

        document.getElementById('btn-kick').addEventListener('click', () => {
            if (targetKickId) {
                socket.emit('kick-user', targetKickId);
                ctxMenu.classList.add('hidden');
            }
        });

    </script>
</body>
</html>
