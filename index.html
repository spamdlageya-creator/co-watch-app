<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Co-Watch | Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/simple-peer@9.11.1/simplepeer.min.js"></script>
    <style>
        body { background: #0f172a; color: white; overflow: hidden; height: 100vh; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .chat-scroll::-webkit-scrollbar { width: 4px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        #video-controls.v-hidden { opacity: 0; pointer-events: none; }
        .msg-group { margin-top: 2px !important; }
    </style>
</head>
<body>

    <div id="toast-error" class="hidden fixed top-5 left-1/2 -translate-x-1/2 z-[100] bg-red-500/90 text-white px-6 py-3 rounded-2xl shadow-2xl font-bold border border-white/20"></div>

    <div id="login-screen" class="w-full h-full flex items-center justify-center p-6 bg-[radial-gradient(circle_at_top_right,_var(--tw-gradient-stops))] from-indigo-900/20 via-slate-900 to-black">
        <div class="w-full max-w-sm glass p-8 rounded-[2rem] shadow-2xl">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-indigo-600 mb-4 shadow-lg shadow-indigo-500/50">
                    <i class="fa-solid fa-play text-2xl"></i>
                </div>
                <h1 class="text-2xl font-black tracking-tight">CO-WATCH <span class="text-indigo-500">PRO</span></h1>
            </div>
            
            <input type="text" id="nickname" class="w-full mb-4 p-4 glass rounded-2xl outline-none focus:border-indigo-500 transition-all" placeholder="Твой ник">
            
            <button id="btn-create" class="w-full py-4 bg-indigo-600 hover:bg-indigo-500 rounded-2xl font-bold transition-all shadow-lg active:scale-95 mb-6">
                Создать комнату
            </button>

            <div class="flex items-center gap-4 mb-6">
                <div class="h-[1px] flex-grow bg-white/10"></div>
                <span class="text-xs text-gray-500 font-bold uppercase tracking-widest">Или войти</span>
                <div class="h-[1px] flex-grow bg-white/10"></div>
            </div>

            <input type="text" id="admin-nickname" class="w-full mb-4 p-4 glass rounded-2xl outline-none focus:border-emerald-500 transition-all" placeholder="Ник админа">
            <button id="btn-join" class="w-full py-4 bg-emerald-600 hover:bg-emerald-500 rounded-2xl font-bold transition-all shadow-lg active:scale-95">
                Смотреть вместе
            </button>
        </div>
    </div>

    <div id="room-screen" class="hidden h-full flex flex-col md:flex-row">
        <div id="video-container" class="relative flex-grow bg-black flex flex-col h-[40vh] md:h-full overflow-hidden">
            <div id="ui-top" class="absolute top-0 w-full p-4 flex justify-between items-center z-20 transition-opacity duration-500">
                <div id="room-badge" class="glass px-4 py-2 rounded-full text-xs font-bold flex items-center gap-2">
                    <div class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></div> <span id="room-id-text">ROOM</span>
                </div>
                <button id="btn-share" class="hidden bg-indigo-600 px-5 py-2 rounded-full text-sm font-black shadow-xl shadow-indigo-500/20 active:scale-90 transition-all">
                    ТРАНСЛЯЦИЯ
                </button>
            </div>

            <video id="video-player" class="w-full h-full object-contain" playsinline autoplay></video>

            <div id="waiting-text" class="absolute inset-0 flex flex-col items-center justify-center text-gray-600 bg-slate-900/50">
                <i class="fa-solid fa-ghost text-5xl mb-4 animate-bounce"></i>
                <p class="font-bold tracking-widest text-sm">ЖДЕМ ЭФИР...</p>
            </div>

            <div id="video-controls" class="absolute bottom-6 right-6 flex items-center gap-4 z-20 transition-opacity duration-500">
                <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1" class="w-20 accent-indigo-500">
                <button id="btn-fullscreen" class="glass w-12 h-12 rounded-full hover:bg-white/10 transition-colors">
                    <i class="fa-solid fa-expand"></i>
                </button>
            </div>
        </div>

        <div class="w-full md:w-80 lg:w-96 flex flex-col glass border-none m-2 rounded-[1.5rem] overflow-hidden">
            <div class="p-4 border-b border-white/5 flex items-center gap-2">
                <i class="fa-solid fa-comment-dots text-indigo-500"></i>
                <span class="font-bold text-sm tracking-tight">LIVE CHAT</span>
            </div>
            
            <div id="chat-messages" class="flex-grow p-4 overflow-y-auto chat-scroll flex flex-col gap-1"></div>

            <form id="chat-form" class="p-4 bg-black/20">
                <div class="relative">
                    <input type="text" id="chat-input" class="w-full p-3 pl-4 pr-12 glass rounded-xl text-sm focus:border-indigo-500 outline-none transition-all" placeholder="Твое сообщение..." autocomplete="off">
                    <button type="submit" class="absolute right-2 top-1/2 -translate-y-1/2 text-indigo-500 p-2">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const socket = io();
        let myName = localStorage.getItem('co_watch_nick') || '';
        if (myName) document.getElementById('nickname').value = myName;

        let roomName = '';
        let isAdmin = false;
        let localStream = null;
        let lastMsgAuthor = null;
        const peers = {};

        // UI Helpers
        function showError(msg) {
            const t = document.getElementById('toast-error');
            t.innerText = msg; t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 4000);
        }

        // --- MOBILE AUTO-HIDE CONTROLS ---
        let uiTimeout;
        const vControls = document.getElementById('video-controls');
        const vTop = document.getElementById('ui-top');
        
        function showUI() {
            vControls.classList.remove('v-hidden');
            vTop.classList.remove('v-hidden');
            clearTimeout(uiTimeout);
            uiTimeout = setTimeout(() => {
                vControls.classList.add('v-hidden');
                vTop.classList.add('v-hidden');
            }, 3000);
        }
        document.getElementById('video-container').addEventListener('mousemove', showUI);
        document.getElementById('video-container').addEventListener('touchstart', showUI);

        // --- LOGIC ---
        document.getElementById('btn-create').addEventListener('click', () => {
            myName = document.getElementById('nickname').value.trim();
            if (!myName) return showError('Введи ник!');
            localStorage.setItem('co_watch_nick', myName);
            isAdmin = true; roomName = myName;
            socket.emit('create-room', roomName);
        });

        document.getElementById('btn-join').addEventListener('click', () => {
            myName = document.getElementById('nickname').value.trim();
            roomName = document.getElementById('admin-nickname').value.trim();
            if (!myName || !roomName) return showError('Заполни поля!');
            localStorage.setItem('co_watch_nick', myName);
            isAdmin = false;
            socket.emit('join-room', roomName, myName);
        });

        socket.on('room-ready', (isC) => {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('room-screen').classList.remove('hidden');
            document.getElementById('room-id-text').innerText = roomName.toUpperCase();
            if (isC) document.getElementById('btn-share').classList.remove('hidden');
        });

        // Исправление бага залагавшего экрана
        async function stopMyStream() {
            if (localStream) {
                localStream.getTracks().forEach(t => t.stop());
                localStream = null;
                socket.emit('stop-stream-notice', roomName);
            }
        }

        document.getElementById('btn-share').addEventListener('click', async () => {
            try {
                if (localStream) await stopMyStream();
                localStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
                document.getElementById('video-player').srcObject = localStream;
                document.getElementById('waiting-text').classList.add('hidden');
                
                // Переподключение всех пиров при смене экрана
                Object.keys(peers).forEach(id => {
                    peers[id].replaceTrack(peers[id].streams[0].getVideoTracks()[0], localStream.getVideoTracks()[0], peers[id].streams[0]);
                });
            } catch (e) { showError('Ошибка доступа'); }
        });

        socket.on('stream-cleared', () => {
            document.getElementById('video-player').srcObject = null;
            document.getElementById('waiting-text').classList.remove('hidden');
        });

        // --- ЧАТ И ГРУППИРОВКА ---
        document.getElementById('chat-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const input = document.getElementById('chat-input');
            if (input.value.trim()) {
                socket.emit('chat-message', roomName, myName, input.value.trim());
                input.value = '';
            }
        });

        socket.on('chat-message', (data) => {
            const container = document.getElementById('chat-messages');
            const isMe = data.user === myName;
            let msgHTML = '';

            if (lastMsgAuthor === data.user) {
                // Группировка (без ника)
                const lastMsgBlock = container.lastElementChild.querySelector('.msg-content');
                const newText = document.createElement('p');
                newText.className = "text-sm mt-1 opacity-90";
                newText.innerText = data.text;
                lastMsgBlock.appendChild(newText);
            } else {
                // Новое сообщение с ником
                const div = document.createElement('div');
                div.className = `flex flex-col ${isMe ? 'items-end' : 'items-start'} mb-2`;
                
                // Кнопка кика для админа
                const kickBtn = (isAdmin && !isMe) ? `<button onclick="socket.emit('kick-user', '${data.id}')" class="ml-2 text-red-500 text-[10px] opacity-50 hover:opacity-100">KICK</button>` : '';

                div.innerHTML = `
                    <div class="flex items-center">
                        <span class="text-[10px] font-black text-gray-500 uppercase mb-1">${data.user}</span>
                        ${kickBtn}
                    </div>
                    <div class="msg-content glass p-3 rounded-2xl ${isMe ? 'rounded-tr-none bg-indigo-600/40' : 'rounded-tl-none bg-white/5'}">
                        <p class="text-sm opacity-90">${data.text}</p>
                    </div>
                `;
                container.appendChild(div);
            }
            
            lastMsgAuthor = data.user;
            container.scrollTop = container.scrollHeight;
        });

        socket.on('kicked-notice', () => {
            alert('Вас кикнули из комнаты');
            window.location.reload();
        });

        // WebRTC Сигналинг (как в прошлой версии)
        socket.on('user-joined', (id, name) => {
            if (isAdmin && localStream) {
                const peer = new SimplePeer({ initiator: true, stream: localStream, trickle: true });
                peer.on('signal', s => socket.emit('signal', id, s));
                peers[id] = peer;
            }
        });

        socket.on('signal', (from, data) => {
            if (isAdmin) {
                if (peers[from]) peers[from].signal(data);
            } else {
                if (!window.viewerPeer) {
                    window.viewerPeer = new SimplePeer({ initiator: false, trickle: true });
                    window.viewerPeer.on('signal', s => socket.emit('signal', from, s));
                    window.viewerPeer.on('stream', st => {
                        document.getElementById('video-player').srcObject = st;
                        document.getElementById('waiting-text').classList.add('hidden');
                    });
                }
                window.viewerPeer.signal(data);
            }
        });

        // Глобальные функции
        document.getElementById('btn-fullscreen').onclick = () => {
            const el = document.getElementById('video-container');
            if (!document.fullscreenElement) el.requestFullscreen();
            else document.exitFullscreen();
        };
    </script>
</body>
</html>
